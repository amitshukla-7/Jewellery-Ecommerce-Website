  <!-- Secure Firebase Auth + Role-based Admin -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAcIX5XXvSQnCro67KK9_jF0AOGg2mDxVc",
      authDomain: "savitri-jewellers-76184.firebaseapp.com",
      projectId: "savitri-jewellers-76184",
      storageBucket: "savitri-jewellers-76184.appspot.com",
      messagingSenderId: "914460735352",
      appId: "1:914460735352:web:d60778c5486d29db983a8d",
      databaseURL: "https://savitri-jewellers-76184-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const adminContent = document.querySelector("main");
    if (adminContent) adminContent.style.display = "none"; // hide until verified

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      try {
        const roleRef = ref(db, `users/${user.uid}/role`);
        const snapshot = await get(roleRef);
        const role = snapshot.val();

        if (role !== "admin") {
          alert("Access denied. Admins only.");
          window.location.href = "/";
          return;
        }

        if (adminContent) adminContent.style.display = "block"; // show admin panel
      } catch (error) {
        console.error("Failed to verify admin role:", error);
        alert("Authentication error. Redirecting to login.");
        window.location.href = "/login.html";
      }
    });

    window.logout = () => {
      signOut(auth)
        .then(() => window.location.href = "/login.html")
        .catch((error) => alert("Logout failed: " + error.message));
    };
  </script>

  <!-- Tiny helper for the hamburger toggle (separate from your module) -->
  <script>
    (function () {
      const btn = document.getElementById('menu-toggle');
      const nav = document.getElementById('admin-nav');

      function isMobile() {
        return window.matchMedia('(max-width: 768px)').matches;
      }

      function closeOnDesktop(e) {
        if (e.matches) return;
        nav.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }

      btn.addEventListener('click', () => {
        if (!isMobile()) return;
        const willOpen = !nav.classList.contains('open');
        nav.classList.toggle('open', willOpen);
        btn.setAttribute('aria-expanded', String(willOpen));
      });

      nav.addEventListener('click', (e) => {
        if (!isMobile()) return;
        if (e.target.tagName === 'BUTTON') {
          nav.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
        }
      });

      const mq = window.matchMedia('(min-width: 769px)');
      const sync = () => {
        if (mq.matches) {
          nav.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
        }
      };
      mq.addEventListener ? mq.addEventListener('change', sync) : mq.addListener(sync);
      sync();
    })();
  </script>
