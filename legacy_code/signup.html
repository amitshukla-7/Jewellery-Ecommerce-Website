<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signup - Savitri Jewellers</title>
  <link rel="stylesheet" href="signup.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="signup-container">
    <h2>Create Account</h2>
    <form id="signupForm">
      <label for="name">Full Name</label>
      <input type="text" id="name" required />

      <label for="email">Email Address</label>
      <input type="email" id="email" required />

      <label for="password">Password</label>
      <input type="password" id="password" required minlength="6" />

      <button type="submit">Sign Up</button>
    </form>
    
    <button id="googleSignInBtn" class="google-btn" type="button">
      <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google logo" />
      <span>Sign in with Google</span>
    </button>

    <p>Already have an account? <a href="login.html">Login here</a></p>
  </div>
  
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  updateProfile, 
  GoogleAuthProvider, 
  signInWithPopup, 
  onAuthStateChanged,
  fetchSignInMethodsForEmail
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAcIX5XXvSQnCro67KK9_jF0AOGg2mDxVc",
  authDomain: "savitri-jewellers-76184.firebaseapp.com",
  projectId: "savitri-jewellers-76184",
  storageBucket: "savitri-jewellers-76184.appspot.com",
  messagingSenderId: "914460735352",
  appId: "1:914460735352:web:d60778c5486d29db983a8d",
  databaseURL: "https://savitri-jewellers-76184-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();
const ADMIN_EMAIL = "24ir10am4@mitsgwl.ac.in";

// ---------------- Google Sign-In ----------------
document.getElementById('googleSignInBtn').addEventListener('click', async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    const snapshot = await get(child(ref(db), "users/" + user.uid));
    let role;

    if (!snapshot.exists()) {
      role = user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase() ? "admin" : "user";
      await set(ref(db, "users/" + user.uid), {
        uid: user.uid,
        name: user.displayName || "",
        email: user.email || "",
        phone: user.phoneNumber || "",
        profileImage: user.photoURL || "https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png",
        signupTime: new Date().toISOString(),
        role: role
      });
    } else {
      role = snapshot.val().role || (user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase() ? "admin" : "user");
    }

    if (role === "admin") window.location.href = "admin.html";
    else window.location.href = "index.html";

  } catch (error) {
    alert("Google login failed: " + error.message);
  }
});

// ---------------- Auto-redirect if already logged in ----------------
onAuthStateChanged(auth, async (user) => {
  if (user) {
    const roleSnap = await get(child(ref(db), "users/" + user.uid + "/role"));
    const role = roleSnap.val();
    if (role === "admin") window.location.href = "admin.html";
    else window.location.href = "index.html";
  }
});

// ---------------- Email/Password Signup ----------------
const form = document.getElementById("signupForm");
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    // Check if email is linked to Google-only
    const methods = await fetchSignInMethodsForEmail(auth, email);
    if (!methods.includes("password") && methods.includes("google.com")) {
      alert("This account was created using Google Sign-In. Please log in with Google.");
      return;
    }

    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;
    await updateProfile(user, { displayName: name });

    const role = email.toLowerCase() === ADMIN_EMAIL.toLowerCase() ? "admin" : "user";

    await set(ref(db, "users/" + user.uid), {
      uid: user.uid,
      name: name,
      email: email,
      phone: "",
      profileImage: "https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png",
      signupTime: new Date().toISOString(),
      role: role
    });

    alert("Signup successful!");
    if (role === "admin") window.location.href = "admin.html";
    else window.location.href = "index.html";

  } catch (error) {
    alert("Signup failed: " + error.message);
  }
});
</script>

</body>
</html>
