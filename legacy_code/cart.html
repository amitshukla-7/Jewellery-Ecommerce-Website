<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Cart | Savitri Jewellers</title>
  <link rel="stylesheet" href="cart.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script type="module" src="cart.js" defer></script>
  <style>
    body {
      visibility: hidden;
    }
    body.auth-loaded {
      visibility: visible;
    }
  </style>
</head>
<body>

  <!-- 🔙 Back Button -->
  <a href="index.html" class="floating-back-btn">
    <i class="fas fa-arrow-left"></i> Continue Shopping
  </a>

  <!-- 🛒 Cart Layout -->
  <div class="cart-wrapper">
    <h1 class="cart-title">My Shopping Cart</h1>

    <div class="cart-layout">
      <!-- Left: Cart Items -->
      <div class="cart-left" id="cart-items">
        <!-- JS injects cart items -->
      </div>

      <!-- Right: Cart Summary -->
      <div class="cart-summary">
        <h3>Price Details</h3>
        <div class="summary-line">
          <span>Total Price</span>
          <span>₹<span id="cart-total">0</span></span>
        </div>
        <div class="summary-line">
          <span>Delivery Charges</span>
          <span class="green">FREE</span>
        </div>
        <hr />
        <div class="summary-line total">
          <strong>Amount Payable</strong>
          <strong>₹<span id="cart-total-payable">0</span></strong>
        </div>
        <button class="checkout-btn" 
        onclick="window.open('https://wa.me/917518401808?text=Hello%2C%20I%20want%20to%20place%20an%20order','_blank')">
        Proceed to Checkout
        </button>

      </div>
    </div>
  </div>

  <!-- ✅ Auth Protection Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAcIX5XXvSQnCro67KK9_jF0AOGg2mDxVc",
      authDomain: "savitri-jewellers-76184.firebaseapp.com",
      projectId: "savitri-jewellers-76184",
      storageBucket: "savitri-jewellers-76184.appspot.com",
      messagingSenderId: "914460735352",
      appId: "1:914460735352:web:d60778c5486d29db983a8d",
      databaseURL: "https://savitri-jewellers-76184-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        const currentPage = window.location.pathname;
        window.location.href = `login.html?redirect=${encodeURIComponent(currentPage)}`;
      } else {
        document.body.classList.add("auth-loaded");
      }
    });
  </script>
</body>
</html>
