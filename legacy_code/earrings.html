<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAcIX5XXvSQnCro67KK9_jF0AOGg2mDxVc",
    authDomain: "savitri-jewellers-76184.firebaseapp.com",
    projectId: "savitri-jewellers-76184",
    storageBucket: "savitri-jewellers-76184.appspot.com",
    messagingSenderId: "914460735352",
    appId: "1:914460735352:web:d60778c5486d29db983a8d",
    databaseURL: "https://savitri-jewellers-76184-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.addEventListener("DOMContentLoaded", () => {
    // Grab buttons after DOM is ready
    const signInBtns = document.querySelectorAll("#signInBtn");
    const logoutBtns = document.querySelectorAll("#logoutBtn, #logout-link");

    onAuthStateChanged(auth, (user) => {
      if (user) {
        signInBtns.forEach(btn => btn.style.setProperty("display", "none", "important"));
        logoutBtns.forEach(btn => btn.style.setProperty("display", "flex", "important"));
      } else {
        signInBtns.forEach(btn => btn.style.setProperty("display", "flex", "important"));
        logoutBtns.forEach(btn => btn.style.setProperty("display", "none", "important"));
      }
    });

    // Add logout functionality
    logoutBtns.forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        signOut(auth).then(() => {
          window.location.href = "index.html";
        });
      });
    });
  });
</script>
